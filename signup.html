<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sign Up — ARC 2025</title>
    <link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700;800&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="auth.css">
</head>
<body>
    <div class="bg-shapes">
        <div class="shape s1"></div>
        <div class="shape s2"></div>
        <div class="shape s3"></div>
    </div>

    <div class="card">
        <div class="card-label">ARC 2025</div>
        <h1 class="card-title">Buat Akun</h1>
        <p class="card-sub">Daftar untuk mengakses sistem kehadiran</p>

        <div id="alert" class="alert hidden"></div>

        <div class="field">
            <label>Nama Lengkap</label>
            <input type="text" id="nama" placeholder="Masukkan nama lengkap" autocomplete="off">
        </div>
        <div class="field">
            <label>Email</label>
            <input type="email" id="email" placeholder="contoh@email.com" autocomplete="off">
        </div>
        <div class="field">
            <label>Password</label>
            <div class="input-wrap">
                <input type="password" id="password" placeholder="Minimal 6 karakter">
                <button class="toggle-pw" type="button" onclick="togglePw('password', this)">👁</button>
            </div>
        </div>
        <div class="field">
            <label>Konfirmasi Password</label>
            <div class="input-wrap">
                <input type="password" id="konfirmasi" placeholder="Ulangi password">
                <button class="toggle-pw" type="button" onclick="togglePw('konfirmasi', this)">👁</button>
            </div>
        </div>

        <button class="btn-primary" onclick="handleSignup()">Daftar Sekarang</button>

        <p class="switch-link">Sudah punya akun? <a href="login.html">Masuk di sini</a></p>
    </div>

    <script>
        function togglePw(id, btn) {
            const input = document.getElementById(id);
            if (input.type === 'password') { input.type = 'text'; btn.textContent = '🙈'; }
            else { input.type = 'password'; btn.textContent = '👁'; }
        }

        function showAlert(msg, type) {
            const el = document.getElementById('alert');
            el.textContent = msg;
            el.className = 'alert ' + type;
        }

        function handleSignup() {
            const nama = document.getElementById('nama').value.trim();
            const email = document.getElementById('email').value.trim();
            const password = document.getElementById('password').value;
            const konfirmasi = document.getElementById('konfirmasi').value;

            if (!nama || !email || !password || !konfirmasi) {
                return showAlert('Semua field wajib diisi.', 'error');
            }
            if (!/^[^\s@]+@[^\s@]+\.[^\s@]+$/.test(email)) {
                return showAlert('Format email tidak valid.', 'error');
            }
            if (password.length < 6) {
                return showAlert('Password minimal 6 karakter.', 'error');
            }
            if (password !== konfirmasi) {
                return showAlert('Password dan konfirmasi tidak cocok.', 'error');
            }

            const users = JSON.parse(localStorage.getItem('arc_users') || '[]');
            if (users.find(u => u.email === email)) {
                return showAlert('Email sudah terdaftar. Silakan login.', 'error');
            }

            users.push({ nama, email, password });
            localStorage.setItem('arc_users', JSON.stringify(users));

            showAlert('Akun berhasil dibuat! Mengarahkan ke halaman login...', 'success');
            setTimeout(() => window.location.href = 'login.html', 1800);
        }

        document.addEventListener('keydown', e => { if (e.key === 'Enter') handleSignup(); });
    </script>
</body>
</html>
