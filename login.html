<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login</title>
    <link rel="stylesheet" href="css/style.css">
</head>
<body class="auth-page">
    <main class="auth-layout">
        <section class="auth-card">
            <img src="assets/images/logo.png" alt="App logo" class="auth-logo">
            <h1>Login</h1>
            <p class="muted">Enter your username and password.</p>

            <form id="loginForm" novalidate>
                <label for="loginUsername">Username</label>
                <input type="text" id="loginUsername" name="username" required>

                <label for="loginPassword">Password</label>
                <input type="password" id="loginPassword" name="password" required>

                <p id="loginMessage" class="message" aria-live="polite"></p>

                <button type="submit" class="btn btn-primary full-width">Login</button>
            </form>

            <p class="switch-text">No account yet? <a href="register.html">Register here</a></p>
        </section>
    </main>
    <script src="js/script.js"></script>
</body>
</html>
