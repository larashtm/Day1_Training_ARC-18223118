<!DOCTYPE html>
<html lang="en">
<head>
	<meta charset="UTF-8">
	<meta name="viewport" content="width=device-width, initial-scale=1.0">
	<title>Forgot Password</title>
	<script src="https://cdn.tailwindcss.com"></script>
	<link rel="stylesheet" href="css/style.css">
</head>
<body class="min-h-screen bg-gradient-to-br from-slate-950 via-slate-900 to-sky-900 text-slate-900 antialiased">
	<main class="mx-auto grid min-h-screen w-full max-w-6xl place-items-center p-6">
		<section class="w-full max-w-md rounded-3xl border border-white/40 bg-white/95 p-8 shadow-2xl backdrop-blur md:p-9">
			<img src="assets/images/logo.png" alt="App logo" class="mb-4 h-16 w-16 rounded-2xl object-cover shadow">
			<h1 class="text-2xl font-bold text-slate-900">Reset Password</h1>
			<p class="mb-5 mt-1 text-sm text-slate-600">Verify your account first, then create a new password.</p>

			<form id="forgotForm" novalidate class="space-y-3">
				<label for="forgotUsername" class="block text-sm font-semibold text-slate-700">Username</label>
				<input type="text" id="forgotUsername" required class="w-full rounded-xl border border-slate-300 px-3 py-2.5 text-sm outline-none transition focus:border-sky-500 focus:ring-2 focus:ring-sky-200">

				<label for="forgotEmail" class="block text-sm font-semibold text-slate-700">Email</label>
				<input type="email" id="forgotEmail" required class="w-full rounded-xl border border-slate-300 px-3 py-2.5 text-sm outline-none transition focus:border-sky-500 focus:ring-2 focus:ring-sky-200" placeholder="student@example.com">

				<button type="button" id="verifyAccountButton" class="w-full rounded-xl border border-slate-300 bg-white px-4 py-2.5 text-sm font-semibold text-slate-700 transition hover:bg-slate-50">Verify Account</button>

				<div id="resetPasswordSection" class="hidden space-y-3 rounded-xl border border-sky-100 bg-sky-50/60 p-3">
					<label for="newPassword" class="block text-sm font-semibold text-slate-700">New Password</label>
					<input type="password" id="newPassword" class="w-full rounded-xl border border-slate-300 px-3 py-2.5 text-sm outline-none transition focus:border-sky-500 focus:ring-2 focus:ring-sky-200">

					<label for="confirmNewPassword" class="block text-sm font-semibold text-slate-700">Confirm New Password</label>
					<input type="password" id="confirmNewPassword" class="w-full rounded-xl border border-slate-300 px-3 py-2.5 text-sm outline-none transition focus:border-sky-500 focus:ring-2 focus:ring-sky-200">

					<button type="submit" class="w-full rounded-xl bg-sky-700 px-4 py-2.5 text-sm font-semibold text-white shadow transition hover:bg-sky-800">Save New Password</button>
				</div>

				<p id="forgotMessage" class="message min-h-5 text-sm" aria-live="polite"></p>
			</form>

			<div class="mt-5 space-y-2 text-sm text-slate-600">
				<p>Back to login? <a href="login.html" class="font-semibold text-sky-700 hover:text-sky-800">Login here</a></p>
				<p>Need an account? <a href="register.html" class="font-semibold text-sky-700 hover:text-sky-800">Register here</a></p>
			</div>
		</section>
	</main>
	<script src="js/script.js"></script>
</body>
</html>
