<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Profil Kehadiran</title>
    <link rel="stylesheet" href="styles.css">
    <style>
        #judul {
            color: #28d654;
            font-size: 50px;
        }

        .besar {
            font-size: 108px;
        }

        .li-1:hover {
            color: yellow;
        }

        /* Styling untuk profile section */
        .profile {
            display: flex;
            align-items: center;
            justify-content: space-between;
        }

        .profile-details {
            flex: 1;
        }

        .profile img {
            max-width: 150px;
            height: auto;
            border-radius: 50%;
            margin-left: 20px;
        }

        table {
            width: 100%;
            border-collapse: collapse;
            margin-top: 30px;
        }

        table th, table td {
            padding: 10px;
            text-align: left;
            border-bottom: 1px solid #ddd;
        }

        table th {
            background-color: #4CAF50;
            color: white;
        }

        footer {
            text-align: center;
            padding: 10px;
            background-color: #333;
            color: white;
            margin-top: 20px;
        }
    </style>
</head>
<body>
    <header>
        <h1>Profil Kehadiran</h1>
    </header>
    
    <section class="profile">
        <div class="profile-details">
            <h2>Data Diri</h2>
            <p><strong>Nama:</strong> Laras Heart</p>
            <p><strong>Divisi:</strong> Teknologi</p>
            <p><strong>Posisi:</strong> Developer</p>
        </div>
        <!-- Gambar Profil -->
        <img src="caca.png.PNG" alt="Foto Profil">
    </section>

    <section class="attendance">
        <h2>Rekap Kehadiran</h2>
        <table>
            <thead>
                <tr>
                    <th>Tanggal</th>
                    <th>Status Kehadiran</th>
                </tr>
            </thead>
            <tbody>
                <tr>
                    <td>1 Februari 2025</td>
                    <td>Hadir</td>
                </tr>
                <tr>
                    <td>2 Februari 2025</td>
                    <td>Hadir</td>
                </tr>
                <tr>
                    <td>3 Februari 2025</td>
                    <td>Alpa</td>
                </tr>
            </tbody>
        </table>
    </section>

    <footer>
        <p>&copy; 2025 Profil Kehadiran</p>
    </footer>
</body>
</html>
